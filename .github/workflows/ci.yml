name: CI

on:
  push:
    branches: [main, dev-*, kernel-test]
  pull_request:
    branches: [main]

jobs:
  erlang:
    name: Erlang Tests + Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: rebar3-otp27-${{ runner.os }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            rebar3-otp27-${{ runner.os }}-

      - name: Compile
        run: rebar3 compile

      - name: Common Test (rootless)
        run: rebar3 ct

      - name: Dialyzer
        run: rebar3 dialyzer

  kernel:
    name: Kernel Tests (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Install nftables CLI
        run: sudo apt-get update && sudo apt-get install -y nftables

      - name: Compile
        run: rebar3 compile

      - name: Kernel Tests (sudo)
        run: sudo -E env "PATH=$PATH" rebar3 ct

  dsl:
    name: Elixir DSL Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Compile DSL
        run: cd dsl && mix compile

      - name: Test DSL
        run: cd dsl && mix test

  release:
    name: Release ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    needs: [erlang]
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-glibc
            container: debian:12
            install: |
              apt-get update
              apt-get install -y curl git make gcc g++ libc6-dev openssl libssl-dev tar xz-utils ca-certificates gnupg
            install_erlang: |
              curl -fsSL https://binaries2.erlang-solutions.com/GPG-KEY-pmanber.asc | gpg --dearmor -o /usr/share/keyrings/erlang-solutions.gpg
              echo "deb [signed-by=/usr/share/keyrings/erlang-solutions.gpg] https://binaries2.erlang-solutions.com/debian bookworm-esl-erlang-27 contrib" > /etc/apt/sources.list.d/erlang.list
              apt-get update
              apt-get install -y esl-erlang
            install_rebar3: |
              curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
              chmod +x /usr/local/bin/rebar3
          - name: x86_64-musl
            container: alpine:3.20
            install: |
              apk add --no-cache bash curl git make gcc g++ musl-dev openssl-dev tar xz
            install_erlang: |
              apk add --no-cache erlang erlang-dev
            install_rebar3: |
              curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
              chmod +x /usr/local/bin/rebar3

    container:
      image: ${{ matrix.target.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Install OS deps
        run: ${{ matrix.target.install }}

      - name: Install Erlang
        run: ${{ matrix.target.install_erlang }}

      - name: Install rebar3
        run: ${{ matrix.target.install_rebar3 }}

      - name: Verify install
        run: erl -noshell -eval 'io:format("OTP ~s~n", [erlang:system_info(otp_release)]), halt().' && rebar3 version

      - name: Build release
        run: rebar3 as prod tar

      - name: Collect artifact
        run: |
          mkdir -p out
          find _build/prod/rel -name '*.tar.gz' -exec cp {} out/${{ github.event.repository.name }}-${{ matrix.target.name }}.tar.gz \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: out/*.tar.gz
