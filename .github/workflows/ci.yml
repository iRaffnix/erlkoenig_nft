name: CI

on:
  push:
    branches: [main, dev-*, kernel-test]
  pull_request:
    branches: [main]

jobs:
  erlang:
    name: Erlang Tests + Dialyzer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: rebar3-otp27-${{ runner.os }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            rebar3-otp27-${{ runner.os }}-

      - name: Compile
        run: rebar3 compile

      - name: Common Test (rootless)
        run: rebar3 ct

      - name: Dialyzer
        run: rebar3 dialyzer

  kernel:
    name: Kernel Tests (root)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Install nftables CLI
        run: sudo apt-get update && sudo apt-get install -y nftables

      - name: Compile
        run: rebar3 compile

      - name: Kernel Tests (sudo)
        run: sudo -E env "PATH=$PATH" rebar3 ct

  dsl:
    name: Elixir DSL Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Compile DSL
        run: cd dsl && mix compile

      - name: Test DSL
        run: cd dsl && mix test

  release:
    name: Release x86_64-linux
    runs-on: ubuntu-22.04
    needs: [erlang]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'
          rebar3-version: '3.24'

      - name: Build CLI escript
        run: cd dsl && mix escript.build
        env:
          MIX_ENV: prod

      - name: Build release
        run: rebar3 as prod tar

      - name: Collect artifact
        run: |
          mkdir -p out
          find _build/prod/rel -name '*.tar.gz' \
            -exec cp {} out/${{ github.event.repository.name }}-x86_64-linux.tar.gz \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64-linux
          path: out/*.tar.gz
