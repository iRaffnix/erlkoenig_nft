name: CI

on:
  push:
    branches: [main, dev-*, kernel-test]
  pull_request:
    branches: [main]

jobs:
  erlang:
    name: Erlang Tests + Dialyzer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: rebar3-otp28-${{ runner.os }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            rebar3-otp28-${{ runner.os }}-

      - name: Compile
        run: rebar3 compile

      - name: Check formatting
        run: rebar3 fmt --check

      - name: Cross-reference analysis
        run: rebar3 xref

      - name: Common Test (rootless)
        run: rebar3 ct

      - name: Dialyzer
        run: rebar3 dialyzer

  kernel:
    name: Kernel Tests (root)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Install nftables CLI
        run: sudo apt-get update && sudo apt-get install -y nftables

      - name: Compile
        run: rebar3 compile

      - name: Kernel Tests (sudo)
        run: sudo -E env "PATH=$PATH" rebar3 ct

  dsl:
    name: Elixir DSL Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'

      - name: Compile DSL
        run: cd dsl && mix compile

      - name: Test DSL
        run: cd dsl && mix test

  release:
    name: Release ${{ matrix.target.name }}
    runs-on: ubuntu-22.04
    needs: [erlang]
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-linux
            image: hexpm/elixir:1.18.4-erlang-28.4.1-debian-bookworm-20260316-slim
            deps: apt-get update && apt-get install -y git make curl
          - name: x86_64-musl
            image: hexpm/elixir:1.18.4-erlang-28.4.1-alpine-3.21.6
            deps: apk add --no-cache git make curl

    container:
      image: ${{ matrix.target.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: ${{ matrix.target.deps }}

      - name: Install rebar3
        run: |
          curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Build CLI escript
        run: cd dsl && MIX_ENV=prod mix escript.build

      - name: Build release
        run: rebar3 as prod tar

      - name: Collect artifact
        run: |
          mkdir -p out
          find _build/prod/rel -name '*.tar.gz' \
            -exec cp {} out/erlkoenig_nft-${{ matrix.target.name }}.tar.gz \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: out/*.tar.gz
