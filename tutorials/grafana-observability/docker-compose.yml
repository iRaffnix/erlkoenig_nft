services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: erlkoenig-otel-collector
    command: ["--config", "/etc/otelcol/config.yaml"]
    ports:
      - "4318:4318"    # OTLP HTTP receiver
    volumes:
      - ./collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: erlkoenig-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: erlkoenig-tempo
    ports:
      - "3200:3200"    # Tempo query frontend
      - "4317:4317"    # OTLP gRPC (used by collector)
    volumes:
      - ./tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: erlkoenig-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: erlkoenig-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:
